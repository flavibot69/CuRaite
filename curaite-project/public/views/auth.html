<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro e Inicio de Sesión</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="header">
            <h1 id="app-name">CuRaite</h1>
            <h1>Sistema de Usuarios</h1>
        </div>
    <div class="forms">
        
        

        <div class="registro">
            <h2>Registro</h2>

            <input
                type="text"
                id="registerName"
                placeholder="Nombre">
            <input
                type="text"
                id="registerFirstName"
                placeholder="Primer Apellido">
            <input
                type="text"
                id="registerLastName"
                placeholder="Segundo Apellido">

            <input
                type="email"
                id="registerEmail"
                placeholder="Correo">

            <input
                type="password"
                id="registerPassword"
                placeholder="Contraseña">
            <p id="password-hint"><span id="highlited-text">*</span> La contraseña debe contener al menos 8 caracteres, 1 mayúscula, un número y un caracter especial</p>
            <br>
            

            <button onclick="register()" type="submit">
                Registrarse
            </button>
        </div>
        
        <hr>

        <div class="registro">
            <h2>Iniciar Sesión</h2>
            <input
                type="text"
                id="loginEmail"
                placeholder="Correo">

            <input
                type="password"
                id="loginPassword"
                placeholder="Contraseña">
                <br>

            <button onclick="login()">
                Entrar
            </button>
        </div>
    </div>
    
    

    <script src="../js/auth.js"></script>

</body>
</html>
